<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -10 50 50" width="500" height="500" shape-rendering="crispEdges">
  <defs>
    <style>
      :root {
        --cat-color: #1A1A1A;
        --cat-outline: #FFFFFF;
        --cat-outline-width: 1;
        --purr-face-x: 0px;
        --purr-face-y: 0px;
      }

      .breathe-anim { transform-origin: 16px 22px; animation: none; }
      /* 꼬리 회전축을 몸 안쪽 (24, 31)로 — 시작점이 거의 안 움직여서 분리 X */
      .tail-sway { transform-origin: 24px 31px; animation: none; }
      .whiskers-flex { transform-origin: 16px 16px; animation: none; }
      .ear-twitch-l { transform-origin: 8px 8px; animation: none; }
      .ear-twitch-r { transform-origin: 19px 9px; animation: none; }

      .eye-l-blink {
        transform-origin: 9px 12.5px;
        animation: none;
      }
      .eye-r-blink {
        transform-origin: 18px 12.5px;
        animation: none;
      }
      :root.idle-animated .breathe-anim { animation: breathe 3.5s infinite ease-in-out; }
      :root.idle-animated .tail-sway { animation: tail-sway 4s infinite ease-in-out; }
      :root.idle-animated .whiskers-flex { animation: whiskers 8s infinite ease-in-out; }
      :root.idle-animated .ear-twitch-l { animation: ear-twitch-l 11s infinite; }
      :root.idle-animated .ear-twitch-r { animation: ear-twitch-r 13s infinite; }
      :root.idle-animated .eye-l-blink,
      :root.idle-animated .eye-r-blink {
        animation: blink 4s infinite;
      }
      .pupil-left {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.24s ease-out;
      }
      .pupil-right {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.24s ease-out;
      }

      :root.purring .eye-l-blink,
      :root.purring .eye-r-blink {
        animation:
          purr-eye-close 0.22s ease-out forwards,
          purr-eye-hide 0.01s linear 0.22s forwards;
      }
      .closed-eye-line {
        opacity: 0;
      }
      #tongue, #water-bowl {
        opacity: 0;
      }
      :root.purring .closed-eye-line {
        animation: purr-closed-eye-show 0.01s linear 0.22s forwards;
      }
      :root.purring #whiskers {
        animation: purr-whiskers 0.7s steps(2, end) infinite;
      }
      :root.purring #face-js {
        animation: purr-face 1.8s steps(2, end) infinite;
      }
      :root.purring .tail-sway {
        animation: purr-tail-flutter 0.4s steps(2, end) infinite;
      }

      :root.hunting .breathe-anim {
        animation: none;
      }
      :root.hunting #face-js {
        transform-origin: 16px 16px;
        animation: hunting-face-crouch 0.42s ease-out forwards;
      }
      :root.hunting .hunting-body-grow {
        transform-origin: 16px 28px;
        animation: hunting-body-grow 0.42s ease-out forwards;
      }
      :root.hunting #body {
        transform-origin: 16px 28px;
        animation: hunting-body-wiggle 0.68s ease-in-out infinite;
      }
      :root.hunting .hunting-tail-rise {
        animation: hunting-tail-rise 0.42s ease-out forwards;
      }
      :root.hunting .tail-sway {
        transform-origin: 24px 31px;
        animation: hunting-tail-wiggle 0.68s ease-in-out 0.12s infinite;
      }
      :root.hunting .pupil-left,
      :root.hunting .pupil-right {
        transform: scale(1.33);
      }
      :root.hunting-return .breathe-anim {
        animation: none;
      }
      :root.hunting-return #face-js {
        transform-origin: 16px 16px;
        animation: hunting-face-return 0.42s ease-out forwards;
      }
      :root.hunting-return .hunting-body-grow {
        transform-origin: 16px 28px;
        animation: hunting-body-return 0.42s ease-out forwards;
      }
      :root.hunting-return #body {
        animation: none;
      }
      :root.hunting-return .hunting-tail-rise {
        animation: hunting-tail-return 0.42s ease-out forwards;
      }
      :root.hunting-return .tail-sway {
        animation: none;
      }
      :root.idle-sleep .breathe-anim {
        transform-origin: 16px 27px;
        animation: none;
      }
      :root.idle-sleep #face-js {
        transform-origin: 16px 16px;
        animation: sleep-face-crouch 0.82s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep .hunting-body-grow {
        transform-origin: 16px 28px;
        animation: sleep-body-grow 0.82s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep .hunting-tail-rise {
        animation: sleep-tail-settle 0.82s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep .tail-sway,
      :root.idle-sleep #body,
      :root.idle-sleep #whiskers,
      :root.idle-sleep .ear-twitch-l,
      :root.idle-sleep .ear-twitch-r {
        animation: none;
      }
      :root.idle-sleep .eye-l-blink,
      :root.idle-sleep .eye-r-blink {
        animation:
          sleep-eye-close 0.24s ease-out forwards,
          sleep-eye-hide 0.01s linear 0.24s forwards;
      }
      :root.idle-sleep .closed-eye-line {
        animation: sleep-closed-eye-show 0.01s linear 0.24s forwards;
      }
      :root.idle-sleep-return .breathe-anim {
        animation: none;
      }
      :root.idle-sleep-return #face-js {
        transform-origin: 16px 16px;
        animation: sleep-face-return 0.62s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep-return .hunting-body-grow {
        transform-origin: 16px 28px;
        animation: sleep-body-return 0.62s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep-return .hunting-tail-rise {
        animation: sleep-tail-return 0.62s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.idle-sleep-return .tail-sway {
        animation: none;
      }

      /* ===== 물 마시기 (drinking) — 헌팅 시작 포즈 재활용 ===== */
      :root.drinking .breathe-anim {
        animation: none;
      }
      /* 물 마실 때는 마우스 추적을 끄고 물에 집중 — 각 부위를 감싼
         트래킹 래퍼의 transform을 무력화한다(포즈 애니메이션은 안쪽 요소에 적용되므로 유지). */
      :root.drinking [data-tracking-wrapper] {
        transform: none !important;
      }
      :root.drinking #face-js,
      :root.drinking #tongue-layer {
        transform-origin: 16px 16px;
        animation: drink-face-crouch 0.7s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.drinking .hunting-body-grow {
        transform-origin: 16px 28px;
        animation: drink-body-grow 0.7s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.drinking .hunting-tail-rise {
        animation: hunting-tail-rise 0.7s ease-out forwards;
      }
      /* GPU 절약: 큰 cat-outline 필터 그룹 안의 무한 애니메이션은 매 프레임 전체
         필터를 재래스터링하므로 비용이 크다. 물 마실 때는 꼬리 흔들기/눈 깜빡임을
         멈추고(정적), 혀만 steps()로 띄엄띄엄 그린다. */
      :root.drinking .tail-sway,
      :root.drinking .eye-l-blink,
      :root.drinking .eye-r-blink,
      :root.drinking #body,
      :root.drinking #whiskers,
      :root.drinking .ear-twitch-l,
      :root.drinking .ear-twitch-r {
        animation: none;
      }
      :root.drinking #eyes-js {
        animation: drink-eyes-lower 0.7s cubic-bezier(0.2, 0.78, 0.25, 1) forwards;
      }
      :root.drinking .pupil-left,
      :root.drinking .pupil-right {
        transform: translateY(1.6px);
      }
      :root.drinking #tongue {
        transform-box: fill-box;
        transform-origin: center top;
        animation: drink-tongue-lick 0.66s steps(4, jump-none) 0.5s infinite;
      }
      :root.drinking #water-bowl {
        animation: drink-bowl-in 0.32s ease-out forwards;
      }

      #body-js, #face-js, #eyes-js {
        transition: transform 0.18s ease-out;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50% { transform: scale(1.015, 0.985) translate(0, 0.4px); }
      }
      /* 꼬리 흔들기 각도 부드럽게 (8° → 5°/3°) */
      @keyframes tail-sway {
        0%, 100% { transform: rotate(0deg); }
        35% { transform: rotate(5deg); }
        75% { transform: rotate(-3deg); }
      }
      @keyframes whiskers {
        0%, 90%, 100% { transform: scaleX(1); }
        92%, 96% { transform: scaleX(1.06); }
        94% { transform: scaleX(1); }
      }
      @keyframes ear-twitch-l {
        0%, 88%, 100% { transform: rotate(0deg); }
        90%, 94% { transform: rotate(-10deg); }
        92% { transform: rotate(0deg); }
      }
      @keyframes ear-twitch-r {
        0%, 78%, 100% { transform: rotate(0deg); }
        80%, 84% { transform: rotate(10deg); }
        82% { transform: rotate(0deg); }
      }
      /* 빠른 깜빡임: 4s 사이클, 96~99% 짧게 (총 0.12s) */
      @keyframes blink {
        0%, 96%, 100% { transform: scaleY(1); }
        97.5% { transform: scaleY(0.1); }
      }
      @keyframes purr-eye-close {
        0% { transform: scaleY(1); }
        100% { transform: scaleY(0.24); }
      }
      @keyframes purr-eye-hide {
        to { opacity: 0; }
      }
      @keyframes purr-closed-eye-show {
        to { opacity: 1; }
      }
      @keyframes purr-whiskers {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(0.6px); }
      }
      @keyframes purr-face {
        0%, 100% { transform: translate(var(--purr-face-x), var(--purr-face-y)); }
        50% { transform: translate(var(--purr-face-x), calc(var(--purr-face-y) + 0.2px)); }
      }
      @keyframes purr-tail-flutter {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(12deg); }
      }
      @keyframes hunting-face-crouch {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(11px) scale(1); }
      }
      @keyframes hunting-body-grow {
        0% { transform: scale(1); }
        100% { transform: scale(1.2); }
      }
      @keyframes hunting-body-wiggle {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-1px); }
        75% { transform: translateX(1px); }
      }
      @keyframes hunting-tail-wiggle {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-1px); }
        75% { transform: translateX(1px); }
      }
      @keyframes hunting-tail-rise {
        0% { transform: translateY(0); }
        100% { transform: translateY(-5px); }
      }
      @keyframes hunting-face-return {
        0% { transform: translateY(11px) scale(1); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes hunting-body-return {
        0% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes hunting-tail-return {
        0% { transform: translateY(-5px); }
        100% { transform: translateY(0); }
      }
      @keyframes sleep-face-crouch {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(11px) scale(0.9); }
      }
      @keyframes sleep-face-return {
        0% { transform: translateY(11px) scale(0.9); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes sleep-body-grow {
        0% { transform: scale(1); }
        100% { transform: scale(1.16); }
      }
      @keyframes sleep-body-return {
        0% { transform: scale(1.16); }
        100% { transform: scale(1); }
      }
      @keyframes sleep-tail-settle {
        0% { transform: translateY(0); }
        100% { transform: translateY(-3px); }
      }
      @keyframes sleep-tail-return {
        0% { transform: translateY(-3px); }
        100% { transform: translateY(0); }
      }
      @keyframes sleep-eye-close {
        0% { transform: scaleY(1); }
        100% { transform: scaleY(0.18); }
      }
      @keyframes sleep-eye-hide {
        to { opacity: 0; }
      }
      @keyframes sleep-closed-eye-show {
        to { opacity: 1; }
      }
      @keyframes drink-face-crouch {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(15px) scale(0.9); }
      }
      @keyframes drink-body-grow {
        0% { transform: scale(1); }
        100% { transform: scale(1.2); }
      }
      @keyframes drink-eyes-lower {
        0% { transform: translateY(0); }
        100% { transform: translateY(1.4px); }
      }
      /* 혀가 입에서 물 위로 날름날름 — 윗변(입)은 고정, 아래로만 늘어났다 줄어든다.
         transform-origin: center top 이라 scaleY가 위쪽을 축으로 아래로 뻗는다. */
      @keyframes drink-tongue-lick {
        0%, 100% { opacity: 0; transform: scaleY(0.2); }
        40% { opacity: 1; transform: scaleY(1.1); }
        75% { opacity: 1; transform: scaleY(1.7); }
      }
      @keyframes drink-bowl-in {
        0% { opacity: 0; transform: translateY(2px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>

    <filter id="cat-outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="dilated"/>
      <feFlood flood-color="var(--cat-outline)" result="flood"/>
      <feComposite in="flood" in2="dilated" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 눈 흰자에 1px 짙은 회색 외곽선 — fixed dark gray -->
    <filter id="eye-outline" x="-50%" y="-50%" width="200%" height="200%">
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="dilated"/>
      <feFlood flood-color="#F5F5F5" result="flood"/>
      <feComposite in="flood" in2="dilated" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="head-clip">
      <path transform="translate(3 4)" d="M4 3H2V5H1V7H0V12H1V16H3V17H4V18H6V19H16V18H18V17H19V16H20V15H21V12H22V8H21V5H20V4H19V3H17V2H15V1H7V2H4V3Z"/>
    </clipPath>
    <clipPath id="body-clip">
      <path transform="translate(3 19)" d="M15 0V1H18V2H20V3H21V6H22V11H21V14H19V15H3V14H1V11H0V6H1V3H2V2H4V1H7V0H15Z"/>
    </clipPath>
    <clipPath id="leg-fl-clip">
      <path d="M6 29V26H7V25H10V26H11V28H12V31H13V32H14V35H13V36H9V35H8V31H7V29H6Z"/>
    </clipPath>
    <clipPath id="leg-fr-clip">
      <path d="M23 29V26H22V25H19V26H18V28H17V31H16V32H15V35H16V36H20V35H21V31H22V29H23Z"/>
    </clipPath>
    <!-- tail-clip은 renderer.js의 installTailComponent가 동적 생성 -->
  </defs>

  <g id="body-js" filter="url(#cat-outline)">
    <g class="breathe-anim">
      <!-- Tail — installTailComponent가 path/patches/clipPath 동적 주입.
           회전축은 부모 .tail-sway에서 (24,31). -->
      <g class="hunting-tail-rise">
        <g class="tail-sway">
          <g id="tail" fill="var(--cat-color)" data-patch-frame="20 24 1 1"></g>
        </g>
      </g>

      <!-- Body — 맨 뒤 레이어 (먼저 그려서 다른 모든 부위가 그 위에 깔림) -->
      <g class="hunting-body-grow">
        <g id="body" fill="var(--cat-color)" data-patch-frame="3 19 1 1">
          <path transform="translate(3 19)" d="M15 0V1H18V2H20V3H21V6H22V11H21V14H19V15H3V14H1V11H0V6H1V3H2V2H4V1H7V0H15Z"/>
          <g class="patches" clip-path="url(#body-clip)"></g>
        </g>
      </g>

      <!-- 앞다리 (default.svg 참고) — 좌/우 따로 색칠 (legFl/legFr 키 분리) -->
      <g id="legs" fill="var(--cat-color)">
        <g id="leg-fl" data-patch-frame="6 25 1 1">
          <path d="M6 29V26H7V25H10V26H11V28H12V31H13V32H14V35H13V36H9V35H8V31H7V29H6Z"/>
          <g class="patches" clip-path="url(#leg-fl-clip)"></g>
        </g>
        <g id="leg-fr" data-patch-frame="15 25 1 1">
          <path d="M23 29V26H22V25H19V26H18V28H17V31H16V32H15V35H16V36H20V35H21V31H22V29H23Z"/>
          <g class="patches" clip-path="url(#leg-fr-clip)"></g>
        </g>
      </g>

      <!-- ===== FACE GROUP ===== -->
      <g id="face-js">

        <g class="whiskers-flex">
          <g id="whiskers" fill="var(--cat-color)" data-heat-overlay="true">
            <rect x="0" y="14" width="5" height="1"/>
            <rect x="23" y="14" width="5" height="1"/>
            <rect x="0" y="17" width="6" height="1"/>
            <rect x="23" y="17" width="6" height="1"/>
          </g>
        </g>

        <!-- 귀 — installEarComponents가 표준 ear path 동적 주입.
             부모 .ear-twitch-l/.ear-twitch-r는 트위치 애니메이션 유지. -->
        <g class="ear-twitch-l">
          <g id="ear-left" data-ear-position="5 2"></g>
        </g>
        <g class="ear-twitch-r">
          <g id="ear-right" data-ear-position="17 2"></g>
        </g>

        <g id="head" fill="var(--cat-color)" data-patch-frame="3 5 1 1">
          <path transform="translate(3 4)" d="M4 3H2V5H1V7H0V12H1V16H3V17H4V18H6V19H16V18H18V17H19V16H20V15H21V12H22V8H21V5H20V4H19V3H17V2H15V1H7V2H4V3Z"/>
          <g class="patches" clip-path="url(#head-clip)"></g>
        </g>

        <g id="eyes-js">
          <g class="eye-l-blink">
            <g id="eye-left">
              <g fill="var(--eye-bg-color, #FFFFFF)">
                <rect x="7" y="11" width="1" height="3"/>
                <rect x="11" y="11" width="1" height="3"/>
                <rect x="8" y="10" width="3" height="5"/>
              </g>
              <rect id="pupil-left" class="pupil-left" x="8" y="11" width="3" height="3" fill="var(--eye-color-left, var(--eye-color, var(--cat-color)))"/>
            </g>
          </g>
          <g class="eye-r-blink">
            <g id="eye-right">
              <g fill="var(--eye-bg-color, #FFFFFF)">
                <rect x="16" y="11" width="1" height="3"/>
                <rect x="20" y="11" width="1" height="3"/>
                <rect x="17" y="10" width="3" height="5"/>
              </g>
              <rect id="pupil-right" class="pupil-right" x="17" y="11" width="3" height="3" fill="var(--eye-color-right, var(--eye-color, var(--cat-color)))"/>
            </g>
          </g>
          <rect class="closed-eye-line" x="7" y="12" width="5" height="1" fill="var(--cat-outline)"/>
          <rect class="closed-eye-line" x="16" y="12" width="5" height="1" fill="var(--cat-outline)"/>
        </g>

      </g>

    </g>

  </g>

  <!-- 혀 — cat-outline 필터 밖(#body-js 바깥)에 둔다. 혀 날름 애니메이션이 매 스텝
       거대한 필터 그룹을 재래스터링하지 않도록 분리해 GPU를 아낀다. 얼굴과 동일한
       crouch 변환(#tongue-layer)을 걸어 입 위치에 정확히 오게 한다. 기본 숨김.
       물그릇보다 '먼저' 그려서 혀 끝이 물 뒤로 가려지게 한다. -->
  <g id="tongue-layer">
    <g id="tongue">
      <rect x="12.5" y="18.2" width="3" height="3" fill="#f48aa6"/>
      <rect x="13.3" y="18.2" width="1.4" height="3" fill="#e06a8a"/>
    </g>
  </g>

  <!-- 물그릇 — 발 아래. 검은 통 + 파란 물 (픽셀 형태). 물 마시기 때만 표시.
       혀보다 '나중에' 그려 혀 끝이 물 뒤로 가려진다. (cat-outline 필터 밖이라 흰 외곽선 없음) -->
  <g id="water-bowl">
    <rect x="6" y="36" width="16" height="2" fill="#54a8f5"/>
    <rect x="6" y="36" width="16" height="0.8" fill="#8fccff"/>
    <rect x="4" y="35" width="2" height="5" fill="#1c1c1c"/>
    <rect x="22" y="35" width="2" height="5" fill="#1c1c1c"/>
    <rect x="4" y="38" width="20" height="2" fill="#1c1c1c"/>
  </g>
</svg>
